<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineFlow — Admin Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <style>
        body {
            background: var(--d-bg);
            color: var(--d-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .login-box {
            background: var(--d-surface);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--c-shadow-lg);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--d-border);
            text-align: center;
            animation: slideUp 0.4s var(--ease);
        }
        .login-box h1 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 8px;
            color: white;
            font-size: 28px;
        }
        .login-box p {
            color: var(--d-text-secondary);
            margin-bottom: 24px;
            font-size: 15px;
        }
        .form-group-login {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group-login label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--d-text-secondary);
            font-weight: 500;
        }
        .form-group-login input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--d-border);
            background: var(--d-surface-2);
            color: var(--d-text);
            border-radius: var(--radius-sm);
            font-size: 15px;
            transition: all 0.3s var(--ease);
            box-sizing: border-box;
        }
        .form-group-login input:focus {
            border-color: var(--c-primary);
            outline: none;
            box-shadow: 0 0 0 3px var(--c-primary-glow);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--c-primary), var(--c-primary-dark));
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s var(--ease);
            box-shadow: 0 4px 14px var(--c-primary-glow);
            margin-bottom: 16px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--c-primary-glow);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg, .success-msg {
            font-size: 14px;
            margin-top: 16px;
            padding: 10px;
            border-radius: var(--radius-sm);
            display: none;
        }
        .error-msg {
            color: var(--a-danger);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .success-msg {
            color: var(--status-ready);
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .link-text {
            color: var(--c-primary);
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        .link-text:hover {
            color: white;
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>⚙️ DineFlow Auth</h1>
        <p>Create a new administrator account</p>
        
        <form id="signupForm">
            <div class="form-group-login">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@restaurant.com" required>
            </div>
            <div class="form-group-login">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required minlength="6">
            </div>
            <button type="submit" class="btn-login" id="submitBtn">Create Account</button>
            
            <a href="/admin-login" class="link-text">Already have an account? Log in</a>
            
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg">Account created! Redirecting...</div>
        </form>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { auth, createUserWithEmailAndPassword } from '/js/firebase-init.js';

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            btn.disabled = true;
            btn.textContent = 'Creating...';
            errorMsg.style.display = 'none';

            try {
                // Firebase creates the user and signs them in automatically
                await createUserWithEmailAndPassword(auth, email, password);
                
                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);
            } catch (error) {
                // Handle Errors here
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
